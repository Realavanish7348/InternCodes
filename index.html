<!-- <!DOCTYPE html> tells browser this is HTML5 -->
<!doctype html>
<!-- html is the root Element  or Boilerplate  for  document structure-->
<html lang="en">
  <!-- head is the metadata which is not visible  -->
  <head>
    <!-- meta it's like webpage information provider, it is always written inside the head tag  -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="title" content="InternCodes - Documenting my coding journey" />
    <meta
      name="description"
      content="InternCodes showcases my learning journey in HTML, CSS, JavaScript, React and Node through real projects."
    />
    <meta
      name="keywords"
      content="HTML, CSS, JavaScript, React, Node, Portfolio, InternCodes"
    />
    <meta name="author" content="Avanish Maurya" />

    <!-- Open Graph (Facebook,)-->
    <meta property="og:title" content="InternCodes - Developer Portfolio" />
    <meta
      property="og:description"
      content="Follow my coding journey through real-world projects."
    />
    <meta
      property="og:image"
      content="https://yourdomain.com/assets/preview.png"
    />
    <meta property="og:url" content="https://interncodes.com" />
    <meta property="og:type" content="website" />

    <!-- Browser tab Icon -->
    <link rel="icon" type="image/png" href="./Images/tab-icon.png" />
    <!-- Font Awesome CDN link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />

    <title>InternCodes | My Developer Journey</title>
  </head>
  <!-- body tag contains all visible content of web app -->
  <body>
    <header class="navbar">
      <nav class="nav-container">
        <ul class="nav-menu">
          <li class="nav-item">
            <a href="#html" class="nav-link"
              ><i class="fa-brands fa-html5" style="color: rgb(223, 31, 23)"></i
            ></a>
          </li>
          <li class="nav-item">
            <a href="#css" class="nav-link"
              ><i class="fa-brands fa-css3" style="color: rgb(21, 127, 216)"></i
            ></a>
          </li>
          <li class="nav-item">
            <a href="#js" class="nav-link"
              ><i
                class="fa-brands fa-square-js"
                style="color: rgb(255, 212, 59)"
              ></i
            ></a>
          </li>
          <li class="nav-item">
            <a href="#react" class="nav-link"
              ><i
                class="fa-brands fa-react"
                style="color: rgb(66, 161, 237)"
              ></i
            ></a>
          </li>
          <li class="nav-item">
            <a href="#node" class="nav-link"
              ><i class="fa-brands fa-node" style="color: rgb(25, 234, 44)"></i
            ></a>
          </li>
        </ul>
      </nav>
    </header>

    <main>
      <!-- Hero Page -->
      <section class="hero">
        <div class="hero-content">
          <p class="hero-eyebrow">Welcome to</p>

          <h1 class="hero-title">Intern<span>Codes</span></h1>

          <p class="hero-description">
            Documenting my journey of learning
            <strong>HTML, CSS, JavaScript, React and Node</strong>
            by building real projects page by page.
          </p>

          <div class="hero-actions">
            <button class="btn btn-primary">Core Skills</button>
            <button class="btn btn-secondary">Soft Skills</button>
          </div>
        </div>
      </section>

      <!-- HTML PAGE -->
      <section id="html" class="page">
        <div class="page-content">
          <p class="page-eyebrow">Welcome to</p>
          <h1 class="page-title">HTML<span>World</span></h1>
          <p class="page-description"></p>
        </div>
      </section>
      <!-- CSS PAGE -->
      <section id="css" class="page">
        <div class="page-content">
          <p class="page-eyebrow">Welcome to</p>
          <h1 class="page-title">CSS<span>World</span></h1>
          <p class="page-description"></p>
        </div>
      </section>
      <!-- Javascript PAGE -->
      <section id="js" class="page">
        <div class="page-content">
          <p class="page-eyebrow">Welcome to</p>
          <h1 class="page-title">Javascript<span>World</span></h1>
          <p class="page-description"></p>
        </div>
      </section>
      <!-- React PAGE -->
      <section id="react" class="page">
        <div class="page-content">
          <p class="page-eyebrow">Welcome to</p>
          <h1 class="page-title">React<span>World</span></h1>
          <p class="page-description"></p>
        </div>
      </section>
      <!-- Node.js PAGE -->
      <section id="node" class="page">
        <div class="page-content">
          <p class="page-eyebrow">Welcome to</p>
          <h1 class="page-title">Node.js<span>World</span></h1>
          <p class="page-description"></p>
        </div>
      </section>
    </main>

    <!--  adding my script file  -->
    <script src="script.js"></script>
  </body>
</html>
